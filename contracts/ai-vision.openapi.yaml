openapi: 3.1.0
info:
  title: Smart Campus — AI Vision API Gateway (Pair 01)
  version: 1.0.0
  description: |
    Hợp đồng API REST sync giữa Camera Stream (Consumer) và AI Vision (Provider).
    Service tiếp nhận hình ảnh từ Camera Stream để chạy suy luận AI (nhận diện đối tượng YOLOv8) 
    và trả về metadata bounding box, class, confidence.
  contact:
    name: Nhóm 02 - WL (Nguyễn Văn Vinh)
    email: vinhnv@example.edu.vn
servers:
  - url: http://localhost:8000
    description: Môi trường Docker Compose (API Gateway nội bộ)
  - url: http://localhost:4010
    description: Prism mock server cục bộ để test
tags:
  - name: health
    description: Kiểm tra trạng thái service
  - name: vision
    description: Các endpoint xử lý suy luận hình ảnh AI
security:
  - bearerAuth: []
paths:
  /health:
    get:
      operationId: getHealth
      summary: Kiểm tra trạng thái service
      description: Endpoint kiểm tra service AI Vision API Gateway còn hoạt động hay không.
      tags: [health]
      security: []
      responses:
        '200':
          description: Service đang hoạt động
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
              examples:
                ok:
                  value:
                    status: ok
                    service: AI Vision API Gateway
                    time: '2026-06-17T08:00:00Z'

  /api/v1/detect:
    post:
      operationId: detectImageObjects
      summary: Phân tích hình ảnh bóc tách đối tượng
      description: |
        Camera Stream đẩy ảnh (khi có motion) lên AI Vision để phân tích.
        Hỗ trợ truyền ảnh qua `snapshot_url` (ưu tiên) hoặc chuỗi `image_base64`.
      tags: [vision]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImageInput'
            examples:
              urlPayload:
                value:
                  request_id: vision-request-001
                  camera_id: cam-gate-a
                  timestamp: '2026-06-17T14:30:10+07:00'
                  location: Main Gate A
                  motion_score: 0.82
                  snapshot_url: "http://team-camera/snapshots/cam-gate-a/20260617_143010.jpg"
      responses:
        '200':
          description: Phân tích hình ảnh thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetectionResult'
              examples:
                successResult:
                  value:
                    request_id: vision-request-001
                    camera_id: cam-gate-a
                    timestamp: '2026-06-17T14:30:11+07:00'
                    detections:
                      - label: person
                        confidence: 0.92
                        bbox:
                          x: 120
                          y: 80
                          width: 210
                          height: 430
                    unknown_person: true
                    risk_level: warning
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /detections/{detectionId}:
    get:
      operationId: getDetectionById
      summary: Lấy chi tiết kết quả phân tích cũ
      description: Tra cứu lại log phân tích AI bằng UUID.
      tags: [vision]
      parameters:
        - name: detectionId
          in: path
          required: true
          description: UUID của lượt phân tích.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Chi tiết kết quả phân tích
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetectionResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /models/info:
    get:
      operationId: getModelInfo
      summary: Lấy cấu hình model AI hiện tại
      description: "Lấy thông tin về model đang được deploy."
      tags: [vision]
      responses:
        '200':
          description: Chi tiết cấu hình model
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelInfo'
              examples:
                modelData:
                  value:
                    modelId: yolov8-campus-v1
                    name: YOLOv8n Object Detector
                    version: 8.1.29
                    supportedClasses: ["person", "car", "motorbike"]
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      additionalProperties: false
      required: [status, service, time]
      properties:
        status:
          type: string
          enum: [ok]
        service:
          type: string
          minLength: 2
          maxLength: 80
        time:
          type: string
          format: date-time

    ImageInput:
      type: object
      required: [request_id, camera_id, timestamp]
      properties:
        request_id:
          type: string
          description: ID duy nhất của request từ nhóm Camera
        camera_id:
          type: string
          description: Mã định danh camera
        timestamp:
          type: string
          format: date-time
        location:
          type: string
          description: Vị trí camera (Tùy chọn)
        motion_score:
          type: number
          description: Điểm số chuyển động (Tùy chọn)
        snapshot_url:
          type: string
          format: uri
          description: Link HTTP/HTTPS trỏ tới ảnh tĩnh (Khuyên dùng)
        image_base64:
          type: string
          description: Chuỗi ảnh Base64 (Dự phòng nếu không dùng URL)

    DetectionResult:
      type: object
      additionalProperties: false
      required: [request_id, camera_id, timestamp, detections, unknown_person, risk_level]
      properties:
        request_id:
          type: string
        camera_id:
          type: string
        timestamp:
          type: string
          format: date-time
        detections:
          type: array
          items:
            $ref: '#/components/schemas/DetectedObject'
        unknown_person:
          type: boolean
          description: Trạng thái phát hiện người lạ
        risk_level:
          type: string
          enum: [low, warning, high]

    DetectedObject:
      type: object
      additionalProperties: false
      required: [label, confidence, bbox]
      properties:
        label:
          type: string
        confidence:
          type: number
          minimum: 0.0
          maximum: 1.0
        bbox:
          $ref: '#/components/schemas/BoundingBox'

    BoundingBox:
      type: object
      additionalProperties: false
      required: [x, y, width, height]
      properties:
        x:
          type: integer
        y:
          type: integer
        width:
          type: integer
        height:
          type: integer

    ModelInfo:
      type: object
      additionalProperties: false
      required: [modelId, name, version, supportedClasses]
      properties:
        modelId:
          type: string
        name:
          type: string
        version:
          type: string
        supportedClasses:
          type: array
          items:
            type: string

    Problem:
      type: object
      additionalProperties: false
      required: [type, title, status]
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
          minLength: 3
          maxLength: 120
        status:
          type: integer
          minimum: 400
          maximum: 599
        detail:
          type: [string, 'null']
          maxLength: 500
        instance:
          type: [string, 'null']
          format: uri
        errors:
          type: array
          minItems: 0
          maxItems: 50
          items:
            type: object
            additionalProperties: false
            required: [field, code, message]
            properties:
              field:
                type: string
                minLength: 1
                maxLength: 80
              code:
                type: string
                minLength: 2
                maxLength: 80
              message:
                type: string
                minLength: 3
                maxLength: 200

  responses:
    BadRequest:
      description: Dữ liệu sai định dạng
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            type: https://api.campus.local/errors/validation
            title: Dữ liệu không hợp lệ
            status: 400
            detail: Payload không đúng JSON Schema
            instance: https://api.campus.local/api/v1/detect
            errors:
              - field: image_base64
                code: MISSING_DATA
                message: Phải cung cấp snapshot_url hoặc image_base64

    Unauthorized:
      description: Thiếu hoặc sai token xác thực
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

    NotFound:
      description: Resource không tồn tại
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

    PayloadTooLarge:
      description: Kích thước ảnh vượt quá giới hạn 5MB
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            type: https://api.campus.local/errors/payload-too-large
            title: Payload Too Large
            status: 413
            detail: Kích thước ảnh truyền vào vượt quá giới hạn cho phép.
            instance: https://api.campus.local/api/v1/detect
            errors: []

    UnprocessableEntity:
      description: JSON hợp lệ nhưng dữ liệu ảnh (Base64/URL) bị hỏng, AI không thể phân tích
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

    TooManyRequests:
      description: Gửi quá nhiều ảnh, vượt khả năng xử lý của hệ thống
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

    InternalServerError:
      description: Lỗi AI Worker không phản hồi
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'