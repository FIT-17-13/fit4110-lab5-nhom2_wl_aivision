version: '3.8'

networks:
  team-internal:
    driver: bridge

services:
  db:
    image: postgres:15-alpine
    container_name: fit4110-db-lab05
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    networks:
      - team-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  ai-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fit4110-ai-lab05
    command: uvicorn src.ai_service.main:app --host 0.0.0.0 --port 9000
    ports:
      - "9000:9000"
    networks:
      - team-internal
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9000/health')\" || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 3

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fit4110-api-lab05
    ports:
      - "8000:8000"
    networks:
      - team-internal
    depends_on:
      db:
        condition: service_healthy
      ai-service:
        condition: service_healthy
