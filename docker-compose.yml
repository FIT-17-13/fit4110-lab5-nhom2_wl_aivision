version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: fit4110-db-lab05
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-aivision_db}
    ports:
      - "5432:5432"
    networks:
      - team-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ai-service:
    build: 
      context: .
      dockerfile: src/ai_service/Dockerfile
    container_name: fit4110-ai-lab05
    ports:
      - "9000:9000"
    networks:
      - team-internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9000/health', timeout=3).read()"]
      interval: 30s
      timeout: 10s
      retries: 3

  api:
    build:
      context: .
      dockerfile: src/api/Dockerfile
    container_name: fit4110-api-lab05
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      - APP_PORT=${APP_PORT:-8000}
      - DB_HOST=db
      - DB_USER=${POSTGRES_USER:-postgres}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-password}
      - DB_NAME=${POSTGRES_DB:-aivision_db}
      - AI_SERVICE_URL=http://ai-service:9000
    depends_on:
      db:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    networks:
      - team-internal

networks:
  team-internal:
    driver: bridge